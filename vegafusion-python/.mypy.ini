[mypy]
python_version = 3.9
cache_dir = .mypy_cache
strict = true
files = vegafusion/

ignore_missing_imports = true

[mypy-vegafusion.proto.datafusion_pb2]
ignore_errors = true

[mypy-vegafusion.proto.datafusion.proto_common.proto.datafusion_common_pb2]
ignore_errors = true

[mypy-_pytest.*]
follow_imports = skip

[mypy-vegafusion.plan_resolver]
# plan_resolver.py uses dynamically-generated protobuf classes that mypy
# cannot type-check (attr-defined, no-any-return, union-attr errors).
disable_error_code = attr-defined, no-any-return, union-attr, unused-ignore